<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pique Media | The Future of Retention</title>
    
    <style>
        :root {
            /* DARK PREMIUM THEME */
            --bg-base: #050505;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-red: #ff3b30;
            --accent-blue: #0066cc;
            --accent-gradient: linear-gradient(135deg, #ff3b30, #af52de, #0066cc);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000000; }
        
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 15s infinite ease-in-out alternate; }
        .orb-1 { width: 600px; height: 600px; background: rgba(0, 102, 204, 0.15); top: -100px; left: -100px; animation-duration: 20s; }
        .orb-2 { width: 700px; height: 700px; background: rgba(175, 82, 222, 0.1); bottom: -200px; right: -100px; animation-duration: 25s; animation-direction: alternate-reverse; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-50px, 100px) scale(1.1); } }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border-radius: 30px;
        }

        nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; z-index: 1000; border-radius: 50px; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; opacity: 0.7; transition: opacity 0.3s; }
        .nav-links a:hover { opacity: 1; }

        #home-container { padding: 150px 5% 50px 5%; display: flex; justify-content: center; }
        #home { position: relative; text-align: center; width: 100%; max-width: 1200px; padding: 60px 20px; overflow: hidden; z-index: 1; }

        /* WATER ANIMATION CSS */
        .water-wave {

            height: 120px;

            background-size: 1440px 120px;
            animation: waveFlow 6s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .water-wave-2 {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(175,82,222,0.15)" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,165.3C1248,149,1344,171,1392,181.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: 1440px 120px;
            animation: waveFlow 9s linear infinite reverse;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes waveFlow { 0% { background-position-x: 0; } 100% { background-position-x: 1440px; } }

        /* ==================================================== */
        /* INSTANT 2.5D CAR SHOWCASE (ZERO LOAD TIME)           */
        /* ==================================================== */
        #fast-car-showcase {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-bottom: 30px;
            z-index: 10;
            position: relative;
        }

        .car-25d-wrapper {
            position: relative;
            width: 650px;
            height: 300px;
            transition: transform 0.1s ease-out; 
            transform-style: preserve-3d;
            animation: hoverCar 4s ease-in-out infinite; 
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 40px 20px rgba(0,0,0,0.9)); 
            position: relative;
            z-index: 5;
        }

        /* GLOWING HEADLIGHTS (Perfectly Aligned) */
        .headlight {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(130,200,255,0.7) 30%, rgba(0,102,204,0) 70%);
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: pulseLight 1.5s infinite alternate;
            z-index: 10;
            pointer-events: none;
        }

        /* ALIGNED FOR THE BMW M5 PNG */
        .hl-left { top: 58%; left: 16%; }
        .hl-right { top: 58%; right: 16%; }

        @keyframes hoverCar {
            0%, 100% { top: 0px; }
            50% { top: -15px; }
        }

        @keyframes pulseLight {
            0% { opacity: 0.7; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.4); }
        }
        /* ==================================================== */

        .hero-badge { background: rgba(255,255,255,0.08); padding: 10px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 30px; display: inline-block; position: relative; z-index: 2; }
        #home h1 { font-size: 6.5rem; font-weight: 800; line-height: 1.05; letter-spacing: -3.5px; margin-bottom: 30px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; position: relative; z-index: 2; }
        .btn-primary { background: #ffffff; color: #000000; padding: 20px 45px; font-size: 1.15rem; font-weight: 600; border-radius: 40px; text-decoration: none; display: inline-block; transition: all 0.3s; position: relative; z-index: 2; border: none; cursor: pointer; }
        .btn-primary:hover { transform: scale(1.04); box-shadow: 0 15px 30px rgba(255,255,255,0.15); background: #f0f0f0; }

        section:not(#home) { padding: 100px 8% 100px 8%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .section-title { font-size: 4rem; font-weight: 800; letter-spacing: -2px; text-align: center; margin-bottom: 15px; position: relative; z-index: 2; }
